 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Usuario</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <!-- Sección del Formulario -->
    <div id="form-container" class="card">
        <h1>AlTA DE USUARIO</h1>
        <p>Completa el siguiente formulario para crear tu cuenta.</p>
        <hr>
        <form id="registroForm">
            <div class="input-group">
                <label>NOMBRE DE USUARIO</label>
                <input type="text" id="nombre" placeholder="Ingresa tu nombre de usuario" required>
            </div>
            <div class="input-group">
                <label>CONTRASEÑA</label>
                <input type="password" id="pass" placeholder="Ingresa tu contraseña" required>
            </div>
            <div class="input-group">
                <label>FECHA DE NACIMIENTO</label>
                <input type="date" id="fecha" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">He leído y acepto las condiciones</label>
            </div>
            <button type="submit" class="btn-primary">Dar de alta</button>
        </form>
    </div>
html
